name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Maven Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        shell: bash
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp verify